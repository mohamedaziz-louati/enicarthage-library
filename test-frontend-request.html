<!DOCTYPE html>
<html>
<head>
    <title>Frontend Request Test</title>
</head>
<body>
    <h1>Frontend Request Test</h1>
    <button onclick="testLogin()">Test Login from Frontend</button>
    <div id="result"></div>

    <script>
        async function testLogin() {
            try {
                console.log('Attempting login...');
                const response = await fetch('http://localhost:8082/api/simple-auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username: 'admin',
                        password: 'admin123'
                    }),
                    mode: 'cors' // Explicitly set CORS mode
                });
                
                const result = document.getElementById('result');
                console.log('Response status:', response.status);
                console.log('Response headers:', response.headers);
                
                if (response.ok) {
                    const data = await response.json();
                    result.innerHTML = `<pre style="color: green;">SUCCESS: ${JSON.stringify(data, null, 2)}</pre>`;
                    console.log('Success:', data);
                } else {
                    const errorText = await response.text();
                    result.innerHTML = `<pre style="color: red;">ERROR ${response.status}: ${errorText}</pre>`;
                    console.error('Error:', errorText);
                }
            } catch (error) {
                document.getElementById('result').innerHTML = `<pre style="color: red;">NETWORK ERROR: ${error.message}</pre>`;
                console.error('Network error:', error);
            }
        }
    </script>
</body>
</html>
