spring:
  application:
    name: enicarthage-library
  main:
    allow-circular-references: true
  datasource:
    url: jdbc:h2:mem:enicarthage_library;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

server:
  port: 8082
  servlet:
    context-path: /api

jwt:
  secret: mySecretKey
  expiration: 86400000

logging:
  level:
    com.enicarthage.library: DEBUG
