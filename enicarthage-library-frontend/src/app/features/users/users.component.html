<div class="users-container">
  <h1>Users Management</h1>

  <div class="users-section">
    <h2>User List</h2>
    <div class="search-filter-bar" *ngIf="isAdmin">
      <input class="search-input" placeholder="First Name" [(ngModel)]="newUser.firstName" />
      <input class="search-input" placeholder="Last Name" [(ngModel)]="newUser.lastName" />
      <input class="search-input" placeholder="Username" [(ngModel)]="newUser.username" />
      <input class="search-input" placeholder="Email" [(ngModel)]="newUser.email" />
      <input class="search-input" placeholder="Password" [(ngModel)]="newUser.password" />
      <select class="filter-select" [(ngModel)]="newUser.role">
        <option value="">Select Role</option>
        <option value="ADMIN">Admin</option>
        <option value="LIBRARIAN">Librarian</option>
        <option value="STUDENT">Student</option>
        <option value="FACULTY">Faculty</option>
      </select>
      <button class="search-button" (click)="createUser()">Add User</button>
    </div>

    <div class="search-filter-bar">
      <input
        type="text"
        class="search-input"
        placeholder="Search users by name, username or email..."
        [(ngModel)]="searchTerm"
        (keyup.enter)="onSearch()"
      />

      <select class="filter-select" [(ngModel)]="selectedRole" (change)="onRoleChange()">
        <option value="">All Roles</option>
        <option value="ADMIN">Admin</option>
        <option value="LIBRARIAN">Librarian</option>
        <option value="STUDENT">Student</option>
        <option value="FACULTY">Faculty</option>
      </select>

      <select class="filter-select" [(ngModel)]="selectedStatus" (change)="onStatusChange()">
        <option value="">All Statuses</option>
        <option value="ACTIVE">Active</option>
        <option value="INACTIVE">Inactive</option>
        <option value="SUSPENDED">Suspended</option>
      </select>

      <button class="search-button" (click)="onSearch()">Search</button>
      <button class="search-button" style="background:#6c757d" (click)="clearFilters()">Clear</button>
    </div>

    <div class="loading" *ngIf="isLoading">
      <div class="loading-spinner">Loading...</div>
    </div>

    <table class="users-table" *ngIf="!isLoading">
      <thead>
        <tr>
          <th>Name</th>
          <th>Username</th>
          <th>Email</th>
          <th>Role</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let user of getPaginatedUsers()">
          <td>{{ user.firstName }} {{ user.lastName }}</td>
          <td>{{ user.username }}</td>
          <td>{{ user.email }}</td>
          <td>
            <span
              class="user-role"
              [ngClass]="{
                'admin': user.role === 'ADMIN',
                'librarian': user.role === 'LIBRARIAN',
                'student': user.role === 'STUDENT',
                'faculty': user.role === 'FACULTY'
              }"
            >
              {{ user.role }}
            </span>
          </td>
          <td>
            <span
              class="user-status"
              [ngClass]="{
                'active': user.status === 'ACTIVE',
                'inactive': user.status === 'INACTIVE',
                'suspended': user.status === 'SUSPENDED'
              }"
            >
              {{ user.status || 'ACTIVE' }}
            </span>
          </td>
          <td>
            <button class="action-button edit" *ngIf="isAdmin" (click)="editUser(user)">Edit</button>
            <button class="action-button delete" *ngIf="isAdmin" (click)="deleteUser(user)">Delete</button>
            <button class="action-button return" *ngIf="!isAdmin" (click)="viewProfile(user)">Profile</button>
          </td>
        </tr>
      </tbody>
    </table>

    <div class="pagination" *ngIf="!isLoading">
      <button class="page-button" [disabled]="currentPage === 0" (click)="onPageChange({ pageIndex: currentPage - 1, pageSize: pageSize, length: totalItems })">Previous</button>
      <button class="page-button active">{{ currentPage + 1 }}</button>
      <button class="page-button" [disabled]="(currentPage + 1) * pageSize >= totalItems" (click)="onPageChange({ pageIndex: currentPage + 1, pageSize: pageSize, length: totalItems })">Next</button>
    </div>
  </div>
</div>
