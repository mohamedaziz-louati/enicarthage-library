<div class="register-container">
  <div class="register-card">
    <div class="register-header">
      <div class="logo-section">
        <mat-icon class="logo-icon">local_library</mat-icon>
        <h1 class="app-title">Join ENICARTHAGE Library</h1>
        <p class="subtitle">Create your account to access our digital library</p>
      </div>
    </div>

    <form class="register-form" [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <div class="form-row">
        <mat-form-field appearance="outline" class="form-field">
          <mat-label>First Name</mat-label>
          <input matInput 
                 formControlName="firstName" 
                 placeholder="Enter your first name"
                 autocomplete="given-name">
          <mat-icon matSuffix>person</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline" class="form-field">
          <mat-label>Last Name</mat-label>
          <input matInput 
                 formControlName="lastName" 
                 placeholder="Enter your last name"
                 autocomplete="family-name">
          <mat-icon matSuffix>person</mat-icon>
        </mat-form-field>
      </div>

      <mat-form-field appearance="outline" class="form-field">
        <mat-label>Email Address</mat-label>
        <input matInput 
               type="email" 
               formControlName="email" 
               placeholder="Enter your email"
               autocomplete="email">
        <mat-icon matSuffix>email</mat-icon>
      </mat-form-field>

      <mat-form-field appearance="outline" class="form-field">
        <mat-label>Username</mat-label>
        <input matInput 
               formControlName="username" 
               placeholder="Choose a username"
               autocomplete="username">
        <mat-icon matSuffix>person</mat-icon>
      </mat-form-field>

      <mat-form-field appearance="outline" class="form-field">
        <mat-label>Password</mat-label>
        <input matInput 
               [type]="hidePassword ? 'password' : 'text'" 
               formControlName="password" 
               placeholder="Create a strong password"
               autocomplete="new-password">
        <button type="button" 
                mat-icon-button 
                matSuffix 
                (click)="hidePassword = !hidePassword"
                class="password-toggle">
          <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
      </mat-form-field>

      <div class="form-options">
        <mat-checkbox formControlName="agreeTerms" class="terms-checkbox">
          I agree to the <a href="#" class="terms-link">Terms of Service</a> and <a href="#" class="terms-link">Privacy Policy</a>
        </mat-checkbox>
      </div>

      <button mat-raised-button 
              type="submit" 
              color="primary"
              class="register-button"
              [disabled]="registerForm.invalid || isLoading">
        <mat-icon *ngIf="!isLoading">person_add</mat-icon>
        <mat-spinner *ngIf="isLoading" diameter="20"></mat-spinner>
        {{ isLoading ? 'Creating Account...' : 'Create Account' }}
      </button>
    </form>

    <div class="divider-section">
      <div class="divider-line"></div>
      <span class="divider-text">OR</span>
      <div class="divider-line"></div>
    </div>

    <div class="signin-section">
      <p class="signin-text">
        Already have an account? 
        <a class="signin-link" routerLink="/login" (click)="navigateToLogin($event)">Sign in now</a>
      </p>
    </div>
  </div>
</div>

<div class="background-decoration">
  <div class="decoration-circle circle-1"></div>
  <div class="decoration-circle circle-2"></div>
  <div class="decoration-circle circle-3"></div>
  <div class="decoration-circle circle-4"></div>
</div>
