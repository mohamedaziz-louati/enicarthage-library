<div class="sidebar">
  <div class="sidebar-header">
    <h3 class="sidebar-title">Admin Panel</h3>
  </div>

  <nav class="sidebar-nav">
    <a 
      routerLink="/dashboard" 
      class="nav-item"
      [class.active]="isActiveRoute('/dashboard')"
    >
      <mat-icon class="nav-icon">dashboard</mat-icon>
      <span class="nav-label">Dashboard</span>
    </a>

    <a 
      routerLink="/books" 
      class="nav-item"
      [class.active]="isActiveRoute('/books')"
    >
      <mat-icon class="nav-icon">menu_book</mat-icon>
      <span class="nav-label">Books</span>
    </a>

    <a 
      routerLink="/events" 
      class="nav-item"
      [class.active]="isActiveRoute('/events')"
    >
      <mat-icon class="nav-icon">event</mat-icon>
      <span class="nav-label">Events</span>
    </a>

    <a 
      routerLink="/users" 
      class="nav-item"
      [class.active]="isActiveRoute('/users')"
    >
      <mat-icon class="nav-icon">people</mat-icon>
      <span class="nav-label">Users</span>
