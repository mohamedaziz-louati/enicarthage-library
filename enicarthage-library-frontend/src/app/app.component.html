<div class="app-container">
  <app-header *ngIf="!isAuthRoute()"></app-header>
  
  <div class="main-content" [ngClass]="{'full-width': isAuthRoute(), 'with-header': !isAuthRoute()}">
    <app-sidebar *ngIf="showSidebar()"></app-sidebar>
    <main class="content-area" [ngClass]="{'with-sidebar': showSidebar()}">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
